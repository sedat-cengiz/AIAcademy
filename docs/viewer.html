<!doctype html>
<html lang="tr">
  <head>
    <meta charset="utf-8" />
    <title>İçerik – AI Academy</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      :root {
        --bg: #050816;
        --bg-elevated: #0b1020;
        --bg-elevated-soft: #101629;
        --border-subtle: rgba(255, 255, 255, 0.06);
        --accent: #4f46e5;
        --accent-soft: rgba(79, 70, 229, 0.16);
        --accent-strong: #818cf8;
        --text: #e5e7eb;
        --text-muted: #9ca3af;
        --success: #22c55e;
        --radius-lg: 18px;
        --radius-md: 14px;
      }

      *, *::before, *::after { box-sizing: border-box; }

      html, body {
        margin: 0; padding: 0;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: radial-gradient(circle at top, #1d1b4e 0, #020617 40%, #000 100%);
        color: var(--text);
      }

      body { min-height: 100vh; }

      .shell {
        max-width: 820px;
        margin: 0 auto;
        padding: 24px 20px 48px;
      }

      .back-bar {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 20px;
      }

      .back-link {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        font-size: 13px;
        color: var(--accent-strong);
        text-decoration: none;
        padding: 7px 14px;
        border-radius: 999px;
        background: rgba(15, 23, 42, 0.9);
        border: 1px solid rgba(129, 140, 248, 0.35);
        transition: border-color .2s;
      }
      .back-link:hover { border-color: rgba(129, 140, 248, 0.7); }

      .content-card {
        border-radius: var(--radius-lg);
        padding: 28px 28px 32px;
        background: linear-gradient(145deg, rgba(15, 23, 42, 0.98), rgba(17, 24, 39, 0.96));
        border: 1px solid rgba(31, 41, 55, 0.9);
        box-shadow: 0 18px 45px rgba(15, 23, 42, 0.85);
      }

      .content-card h1 {
        font-size: 26px;
        margin: 0 0 6px;
        background: linear-gradient(135deg, #e0e7ff, #818cf8);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      .content-card h2 {
        font-size: 20px;
        margin: 28px 0 10px;
        padding-top: 18px;
        border-top: 1px solid rgba(55, 65, 81, 0.5);
        color: #c7d2fe;
      }

      .content-card h3 {
        font-size: 16px;
        margin: 20px 0 8px;
        color: var(--accent-strong);
      }

      .content-card h4 {
        font-size: 14px;
        margin: 16px 0 6px;
        color: #a5b4fc;
      }

      .content-card p {
        font-size: 14px;
        line-height: 1.7;
        margin: 0 0 12px;
        color: var(--text);
      }

      .content-card ul, .content-card ol {
        padding-left: 22px;
        margin: 0 0 12px;
      }

      .content-card li {
        font-size: 14px;
        line-height: 1.65;
        margin-bottom: 5px;
        color: var(--text);
      }

      .content-card li ul, .content-card li ol {
        margin-top: 4px;
        margin-bottom: 4px;
      }

      .content-card strong { color: #c7d2fe; }

      .content-card em { color: var(--text-muted); font-style: italic; }

      .content-card a {
        color: var(--accent-strong);
        text-decoration: none;
        border-bottom: 1px dashed rgba(129, 140, 248, 0.4);
      }
      .content-card a:hover { border-bottom-style: solid; }

      .content-card code {
        font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
        font-size: 13px;
        background: rgba(79, 70, 229, 0.12);
        padding: 2px 6px;
        border-radius: 5px;
        color: #a5b4fc;
      }

      .content-card pre {
        background: rgba(2, 6, 23, 0.85);
        border: 1px solid rgba(55, 65, 81, 0.6);
        border-radius: 10px;
        padding: 14px 16px;
        overflow-x: auto;
        margin: 0 0 14px;
      }

      .content-card pre code {
        background: none;
        padding: 0;
        font-size: 13px;
        color: var(--text);
        line-height: 1.55;
      }

      .content-card blockquote {
        margin: 0 0 14px;
        padding: 10px 16px;
        border-left: 3px solid var(--accent-strong);
        background: rgba(79, 70, 229, 0.08);
        border-radius: 0 8px 8px 0;
      }

      .content-card blockquote p {
        margin: 0;
        color: #c7d2fe;
      }

      .content-card hr {
        border: none;
        border-top: 1px solid rgba(55, 65, 81, 0.5);
        margin: 24px 0;
      }

      .content-card table {
        width: 100%;
        border-collapse: collapse;
        margin: 0 0 14px;
        font-size: 13px;
      }

      .content-card th, .content-card td {
        padding: 8px 10px;
        border: 1px solid rgba(55, 65, 81, 0.6);
        text-align: left;
      }

      .content-card th {
        background: rgba(79, 70, 229, 0.15);
        color: #c7d2fe;
        font-weight: 600;
      }

      .content-card td { color: var(--text); }

      .meta-bar {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-bottom: 18px;
      }

      .meta-pill {
        font-size: 11px;
        padding: 4px 10px;
        border-radius: 999px;
        background: rgba(15, 23, 42, 0.9);
        border: 1px solid rgba(55, 65, 81, 0.7);
        color: var(--text-muted);
      }

      .loading {
        text-align: center;
        padding: 40px 0;
        color: var(--text-muted);
        font-size: 14px;
      }

      .error {
        text-align: center;
        padding: 40px 0;
        color: #ef4444;
        font-size: 14px;
      }

      @media (max-width: 640px) {
        .shell { padding: 16px 12px 32px; }
        .content-card { padding: 18px 16px 22px; }
        .content-card h1 { font-size: 22px; }
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <div class="back-bar">
        <a href="/" class="back-link">&#8592; Portala Dön</a>
      </div>
      <div class="content-card">
        <div id="content"><p class="loading">Yükleniyor…</p></div>
      </div>
    </div>

    <script>
    (function () {
      const defined = {
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;'
      };

      function esc(s) {
        return s.replace(/[&<>"]/g, c => defined[c]);
      }

      function parseMd(src) {
        const lines = src.replace(/\r\n/g, '\n').split('\n');
        let html = '';
        let i = 0;
        const n = lines.length;

        function collectList(startIdx, ordered) {
          const marker = ordered ? /^\d+\.\s+/ : /^[-*]\s+/;
          const tag = ordered ? 'ol' : 'ul';
          let out = `<${tag}>`;
          let idx = startIdx;
          while (idx < n && marker.test(lines[idx].trimStart())) {
            const line = lines[idx].trimStart();
            const indent = lines[idx].length - lines[idx].trimStart().length;
            const text = line.replace(marker, '');
            out += '<li>' + inline(text);
            idx++;
            if (idx < n) {
              const nextLine = lines[idx];
              const nextIndent = nextLine.length - nextLine.trimStart().length;
              if (nextIndent > indent && (nextLine.trimStart().match(/^[-*]\s+/) || nextLine.trimStart().match(/^\d+\.\s+/))) {
                const subOrdered = !!nextLine.trimStart().match(/^\d+\.\s+/);
                const sub = collectList(idx, subOrdered);
                out += sub.html;
                idx = sub.endIdx;
              }
            }
            out += '</li>';
          }
          out += `</${tag}>`;
          return { html: out, endIdx: idx };
        }

        while (i < n) {
          const line = lines[i];
          const trimmed = line.trimStart();

          if (trimmed === '') { i++; continue; }

          if (/^#{1,4}\s/.test(trimmed)) {
            const m = trimmed.match(/^(#{1,4})\s+(.*)/);
            const lvl = m[1].length;
            html += `<h${lvl}>${inline(m[2])}</h${lvl}>`;
            i++; continue;
          }

          if (/^```/.test(trimmed)) {
            const lang = trimmed.slice(3).trim();
            i++;
            let code = '';
            while (i < n && !/^```/.test(lines[i].trimStart())) {
              code += esc(lines[i]) + '\n';
              i++;
            }
            i++;
            html += `<pre><code>${code.replace(/\n$/, '')}</code></pre>`;
            continue;
          }

          if (/^>\s?/.test(trimmed)) {
            let bq = '';
            while (i < n && /^>\s?/.test(lines[i].trimStart())) {
              bq += lines[i].trimStart().replace(/^>\s?/, '') + '\n';
              i++;
            }
            html += `<blockquote><p>${inline(bq.trim())}</p></blockquote>`;
            continue;
          }

          if (/^[-*]\s+/.test(trimmed)) {
            const res = collectList(i, false);
            html += res.html;
            i = res.endIdx;
            continue;
          }

          if (/^\d+\.\s+/.test(trimmed)) {
            const res = collectList(i, true);
            html += res.html;
            i = res.endIdx;
            continue;
          }

          if (/^---+$/.test(trimmed) || /^\*\*\*+$/.test(trimmed)) {
            html += '<hr>';
            i++; continue;
          }

          if (/^\|/.test(trimmed)) {
            let rows = [];
            while (i < n && /^\|/.test(lines[i].trim())) {
              rows.push(lines[i].trim());
              i++;
            }
            if (rows.length >= 2) {
              const hdrCells = rows[0].split('|').filter(c => c.trim() !== '').map(c => c.trim());
              let thtml = '<table><thead><tr>';
              hdrCells.forEach(c => { thtml += `<th>${inline(c)}</th>`; });
              thtml += '</tr></thead><tbody>';
              for (let r = 2; r < rows.length; r++) {
                const cells = rows[r].split('|').filter(c => c.trim() !== '').map(c => c.trim());
                thtml += '<tr>';
                cells.forEach(c => { thtml += `<td>${inline(c)}</td>`; });
                thtml += '</tr>';
              }
              thtml += '</tbody></table>';
              html += thtml;
            }
            continue;
          }

          let para = '';
          while (i < n && lines[i].trim() !== '' && !/^#{1,4}\s/.test(lines[i].trimStart()) && !/^```/.test(lines[i].trimStart()) && !/^>\s?/.test(lines[i].trimStart()) && !/^[-*]\s+/.test(lines[i].trimStart()) && !/^\d+\.\s+/.test(lines[i].trimStart()) && !/^---+$/.test(lines[i].trimStart()) && !/^\|/.test(lines[i].trimStart())) {
            para += (para ? ' ' : '') + lines[i].trim();
            i++;
          }
          if (para) html += `<p>${inline(para)}</p>`;
        }

        return html;
      }

      function inline(s) {
        s = esc(s);
        s = s.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
        s = s.replace(/\*(.+?)\*/g, '<em>$1</em>');
        s = s.replace(/`([^`]+)`/g, '<code>$1</code>');
        s = s.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
        s = s.replace(/  $/, '<br>');
        return s;
      }

      async function main() {
        const el = document.getElementById('content');
        const params = new URLSearchParams(window.location.search);
        const docPath = params.get('doc');

        if (!docPath) {
          el.innerHTML = '<p class="error">Doküman belirtilmedi.</p>';
          return;
        }

        try {
          const base = window.location.pathname.replace(/\/[^/]*$/, '/');
          const resp = await fetch(base + docPath);
          if (!resp.ok) throw new Error(resp.status);
          const md = await resp.text();

          const titleMatch = md.match(/^#\s+(.+)/m);
          if (titleMatch) {
            document.title = titleMatch[1] + ' – AI Academy';
          }

          el.innerHTML = parseMd(md);
        } catch (e) {
          el.innerHTML = `<p class="error">Doküman yüklenemedi: ${esc(docPath)}</p>`;
        }
      }

      main();
    })();
    </script>
  </body>
</html>
